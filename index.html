    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root {
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #020617; 
            color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 118, 110, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }
        .glass { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; transform: scale(1.05); }
        .day-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .day-card:hover { background: rgba(51, 65, 85, 0.4); transform: translateY(-4px); }
        .img-container { position: relative; overflow: hidden; border-radius: 1.5rem; height: 200px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .day-card:hover .img-container img { transform: scale(1.1); }
        
        /* Translate Styling */
        #google_translate_element { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        .goog-te-gadget-simple { 
            background: rgba(30, 41, 59, 0.9) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            padding: 10px 15px !important; 
            border-radius: 99px !important; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3) !important;
        }
        .goog-te-gadget-simple span { color: #94a3b8 !important; font-size: 12px !important; font-weight: 800 !important; text-transform: uppercase; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        body { top: 0px !important; }

        .price-badge { font-family: monospace; background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-done { border-left: 4px solid #10b981; opacity: 0.7; }
        .status-pending { border-left: 4px solid #3b82f6; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

            { phase: 'phase5', date: '27/06', title: 'Vondelpark & Relax', city: 'Ámsterdam', log: 'Tranvía.', journey: 'Morning: Anne Frank House (if booked). Afternoon: Vondelpark picnic. Evening: Farewell dinner in Jordaan.', tip: 'Book Anne Frank House exactly 6 weeks in advance at 10 AM.', map: 'https://maps.app.goo.gl/vondel', cost: '€100', img: 'https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase5', date: '28/06', title: 'Regreso al Origen', city: 'Madrid', log: 'Vuelo AMS-MAD.', journey: 'Morning: Final stroopwafel. Afternoon: Flight to Madrid. Evening: Tapas in La Latina.', tip: 'Arrive at Schiphol 3 hours early; security can be slow.', map: 'https://maps.app.goo.gl/latina', cost: '€90', img: 'https://images.unsplash.com/photo-1539037116277-4db20889f2d4?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase5', date: '29/06', title: 'Compras Rastro', city: 'Madrid', log: 'Caminar por Embajadores.', journey: 'Morning: Explore El Rastro flea market. Afternoon: Shopping in Chueca. Evening: Vermouth and tapas.', tip: 'The best treasures at El Rastro are in the side streets.', map: 'https://maps.app.goo.gl/rastro', cost: '€60', img: 'https://images.unsplash.com/photo-1549144411-97cbb1926f7d?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase5', date: '30/06', title: 'Despedida Seba', city: 'Madrid', log: 'Chill en Casa de Campo.', journey: 'Morning: Cable car to Casa de Campo. Afternoon: Relax by the lake. Evening: Final big Spanish dinner.', tip: 'The Teleférico offers great views of the Royal Palace.', map: 'https://maps.app.goo.gl/casacampo', cost: '€65', img: 'https://images.unsplash.com/photo-1510672981848-a1c4f1cb5ccf?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase5', date: '01/07', title: 'Logística Final', city: 'Madrid', log: 'Check-in JFK.', journey: 'Morning: Souvenir shopping. Afternoon: Pack and check documents. Evening: Last churros at San Ginés.', tip: 'San Ginés is open 24 hours; go late to avoid the line.', map: 'https://maps.app.goo.gl/madridfinal', cost: '€50', img: 'https://images.unsplash.com/photo-1543783232-260bc8c4161b?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase5', date: '02/07', title: 'Salida MAD-JFK', city: 'Aeropuerto', log: 'Taxi/Uber a T4.', journey: 'Morning: Head to Barajas Terminal 4. Afternoon: Flight to JFK. Evening: Arrival in NYC.', tip: 'T4 is beautiful but huge; allow extra time to reach your gate.', map: 'https://maps.app.goo.gl/t4', cost: '€40', img: 'https://images.unsplash.com/photo-1436491865332-7a61a109c0f2?auto=format&fit=crop&w=1200&q=80' }
        ];

        const checklist = {
            "Combat Essentials": ["Passport (+ Cloud Copy)", "AirTags (inside bags)", "eSim App (Airalo)", "Universal Adapter", "Powerbank 20k mAh"],
            "Higiene & Health": ["Ibuprofen/Meds", "Solid Soap/Shampoo", "Microfiber Toall", "Sunscreen 50+", "Earplugs (for planes)"],
            "Tech Command": ["Cables (USB-C/Light)", "Noise Cancel Phones", "Offline Maps DL", "Ziploc bags (Liquids)"],
            "Survival": ["Comfy Walking Shoes", "Refillable Bottle", "Printed Emergency Contacts", "Small Rain Poncho"]
        };

        function openTab(evt, phaseId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(phaseId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function toggleDay(date) {
            const current = localStorage.getItem('trip-' + date) === 'done' ? 'pending' : 'done';
            localStorage.setItem('trip-' + date, current);
            render();
        }

        function render() {
            const phases = ['phase1', 'phase2', 'phase3', 'phase4', 'phase5'];
            phases.forEach(p => document.getElementById(p).innerHTML = '');

            let doneCount = 0;
            tripData.forEach(day => {
                const isDone = localStorage.getItem('trip-' + day.date) === 'done';
                if(isDone) doneCount++;
                const container = document.getElementById(day.phase);
                if(!container) return;

                container.innerHTML += `
                    <div class="glass p-6 md:p-8 rounded-[2.5rem] day-card ${isDone ? 'status-done' : 'status-pending'} cursor-pointer" onclick="toggleDay('${day.date}')">
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                            <div class="md:col-span-4">
                                <div class="img-container">
                                    <img src="${day.img}" alt="${day.city}">
                                    <div class="absolute top-4 left-4 glass px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">${day.date}</div>
                                </div>
                            </div>
                            <div class="md:col-span-8 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 class="text-3xl font-extrabold tracking-tighter">${day.title}</h3>
                                            <p class="text-blue-400 font-bold text-xs uppercase tracking-[0.2em] mt-1">${day.city}</p>
                                        </div>
                                        <span class="price-badge px-4 py-1.5 rounded-full text-xs font-bold">${day.cost}</span>
                                    </div>
                                    <p class="text-slate-300 text-sm font-medium leading-relaxed mb-6">${day.journey}</p>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                            <p class="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-2">Transporte</p>
                                            <p class="text-[11px] font-medium text-slate-200">${day.log}</p>
                                        </div>
                                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                            <p class="text-[8px] font-black text-amber-500 uppercase tracking-widest mb-2">Tip de Local</p>
                                            <p class="text-[11px] font-medium text-slate-200 italic">"${day.tip}"</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-6 flex items-center justify-between">
                                    <a href="${day.map}" target="_blank" onclick="event.stopPropagation()" class="inline-flex items-center gap-2 text-[10px] font-black uppercase text-blue-400 hover:text-white transition">
                                        <i class="fa-solid fa-map-location-dot"></i> Open in Maps
                                    </a>
                                    <div class="text-[9px] font-black uppercase ${isDone ? 'text-emerald-400' : 'text-slate-500'}">
                                        ${isDone ? '<i class="fa-solid fa-circle-check"></i> MISSION DONE' : '<i class="fa-solid fa-circle-notch fa-spin"></i> PENDING'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('main-progress').innerText = Math.round((doneCount / tripData.length) * 100) + '%';
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-render');
            for(const [cat, items] of Object.entries(checklist)) {
                let html = `<div class="space-y-6">
                    <h4 class="text-xs font-black text-blue-500 uppercase tracking-[0.3em] border-b border-white/10 pb-4">${cat}</h4>
                    <div class="space-y-4">`;
                items.forEach(item => {
                    html += `
                        <div class="flex items-center gap-4 group cursor-pointer">
                            <input type="checkbox" class="w-5 h-5 rounded-lg border-white/20 bg-slate-900 text-blue-500 focus:ring-0">
                            <label class="text-sm font-bold text-slate-400 group-hover:text-white transition">${item}</label>
                        </div>
                    `;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'es', includedLanguages: 'en,es', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        window.onload = () => {
            render();
            renderChecklist();
        };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
