<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUROTRIP 2026 | MISSION CONTROL v16.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root {
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #020617; 
            color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 118, 110, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }
        .glass { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; transform: scale(1.05); }
        .day-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .day-card:hover { background: rgba(51, 65, 85, 0.4); transform: translateY(-4px); }
        .img-container { position: relative; overflow: hidden; border-radius: 1.5rem; height: 200px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .day-card:hover .img-container img { transform: scale(1.1); }
        
        /* Translate Styling */
        #google_translate_element { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        .goog-te-gadget-simple { 
            background: rgba(30, 41, 59, 0.9) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            padding: 10px 15px !important; 
            border-radius: 99px !important; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3) !important;
        }
        .goog-te-gadget-simple span { color: #94a3b8 !important; font-size: 12px !important; font-weight: 800 !important; text-transform: uppercase; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        body { top: 0px !important; }

        .price-badge { font-family: monospace; background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-done { border-left: 4px solid #10b981; opacity: 0.7; }
        .status-pending { border-left: 4px solid #3b82f6; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen pb-24">
    <div id="google_translate_element"></div>

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <header class="glass p-8 md:p-12 rounded-[3rem] mb-10 flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-5"><i class="fa-solid fa-plane-departure text-9xl"></i></div>
            <div class="relative z-10">
                <div class="inline-flex items-center gap-2 bg-blue-500/20 text-blue-400 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase mb-4 border border-blue-500/30">
                    <span class="flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span>
                    Telemetry Active • v16.0
                </div>
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-none">EUROTRIP <span class="text-blue-500">2026</span></h1>
                <p class="text-slate-400 mt-4 text-lg font-medium">Seba & Tavi • 32 Days of Perfect Logistics</p>
            </div>
            
            <div class="flex flex-wrap gap-4 relative z-10 justify-center">
                <div class="glass px-8 py-5 rounded-3xl text-center border-emerald-500/20">
                    <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">Budget</p>
                    <p class="text-3xl font-bold text-emerald-400">€2,850</p>
                </div>
                <div class="glass px-8 py-5 rounded-3xl text-center border-blue-500/20">
                    <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">Misión</p>
                    <p id="main-progress" class="text-3xl font-bold text-blue-400">0%</p>
                </div>
            </div>
        </header>

        <!-- DASHBOARD GRID -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-10">
            <!-- SIDEBAR -->
            <div class="lg:col-span-1 space-y-6">
                <!-- SOS -->
                <div class="glass p-6 rounded-[2rem] border-rose-500/20">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-shield-heart text-rose-500"></i> SOS & Utility
                    </h3>
                    <div class="space-y-3">
                        <a href="tel:112" class="flex justify-between items-center bg-rose-500/10 p-3 rounded-2xl border border-rose-500/20 hover:bg-rose-500/20 transition">
                            <span class="text-xs font-bold">EMERGENCY EU</span>
                            <span class="text-rose-500 font-black">112</span>
                        </a>
                        <div class="p-3 bg-slate-900/50 rounded-2xl border border-slate-700/50 text-[10px] leading-tight">
                            <p class="text-slate-500 font-bold mb-1 uppercase">Passport Status</p>
                            <p class="text-emerald-400 font-bold">CHILE: 90 DAYS FREE</p>
                        </div>
                    </div>
                </div>

                <!-- QUICK VAULT -->
                <div class="glass p-6 rounded-[2rem]">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Document Vault</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="bg-slate-800 p-4 rounded-2xl hover:bg-blue-900/40 transition border border-slate-700 flex flex-col items-center gap-2">
                            <i class="fa-solid fa-plane-up text-blue-400"></i>
                            <span class="text-[9px] font-black uppercase">Flights</span>
                        </button>
                        <button class="bg-slate-800 p-4 rounded-2xl hover:bg-purple-900/40 transition border border-slate-700 flex flex-col items-center gap-2">
                            <i class="fa-solid fa-hotel text-purple-400"></i>
                            <span class="text-[9px] font-black uppercase">Hotels</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="lg:col-span-3">
                <nav class="flex gap-2 overflow-x-auto pb-6 mb-6 no-scrollbar sticky top-4 z-50">
                    <button onclick="openTab(event, 'phase1')" class="tab-btn active glass px-8 py-4 rounded-2xl font-black text-[10px] whitespace-nowrap uppercase tracking-widest transition-all">PH I: Madrid</button>
                    <button onclick="openTab(event, 'phase2')" class="tab-btn glass px-8 py-4 rounded-2xl font-black text-[10px] whitespace-nowrap uppercase tracking-widest transition-all">PH II: Portugal</button>
                    <button onclick="openTab(event, 'phase3')" class="tab-btn glass px-8 py-4 rounded-2xl font-black text-[10px] whitespace-nowrap uppercase tracking-widest transition-all">PH III: The Hito</button>
                    <button onclick="openTab(event, 'phase4')" class="tab-btn glass px-8 py-4 rounded-2xl font-black text-[10px] whitespace-nowrap uppercase tracking-widest transition-all">PH IV: Paris & Berlin</button>
                    <button onclick="openTab(event, 'phase5')" class="tab-btn glass px-8 py-4 rounded-2xl font-black text-[10px] whitespace-nowrap uppercase tracking-widest transition-all">PH V: Ams & Final</button>
                </nav>

                <div id="itinerary-grid" class="space-y-8">
                    <div id="phase1" class="tab-content active space-y-6"></div>
                    <div id="phase2" class="tab-content space-y-6"></div>
                    <div id="phase3" class="tab-content space-y-6"></div>
                    <div id="phase4" class="tab-content space-y-6"></div>
                    <div id="phase5" class="tab-content space-y-6"></div>
                </div>
            </div>
        </div>

        <!-- FULL CHECKLIST -->
        <section class="glass p-10 md:p-16 rounded-[4rem] mb-20">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-4xl font-black mb-12 text-center">Ultimate <span class="text-blue-500">Checklist</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16" id="checklist-render"></div>
            </div>
        </section>

        <footer class="text-center text-slate-700 text-[10px] font-black uppercase tracking-[1em] pb-10">
            Designed for Seba & Tavi • v16.0 Tactical Release
        </footer>
    </div>

    <script>
        const tripData = [
            // RE-INJECTING ALL 32 DAYS DATA (Consolidated from Pauli-Dev history)
            { phase: 'phase1', date: '31/05', title: 'Operación Barajas', city: 'Madrid', log: 'Metro L8 -> Sol. Buy Multi Card (€2.5).', journey: '08:00 Land & Drop bags. 13:00 Bocata calamares (Plaza Mayor). 20:00 Sunset Templo de Debod.', tip: 'Avoid taxis, Metro is faster to Sol.', map: 'https://maps.app.goo.gl/9Z1J3', cost: '€40', img: 'https://images.unsplash.com/photo-1539037116277-4db20889f2d4?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase1', date: '01/06', title: 'Madrid Histórico', city: 'Madrid', log: 'Walking day. Comfy shoes mandatory.', journey: '09:00 Churros San Gines. 12:00 Palacio Real. 19:00 Tapas tour Malasaña.', tip: 'Prado Museum is free 18:00-20:00.', map: 'https://maps.app.goo.gl/madrid1', cost: '€35', img: 'https://images.unsplash.com/photo-1543783232-260bc8c4161b?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase1', date: '02/06', title: 'Tavi Landing', city: 'Madrid', log: 'Pick up at Atocha Train Station.', journey: '10:00 Reencuentro. 14:00 Picnic El Retiro. 21:00 Welcome Dinner (Pez Tortilla).', tip: 'Book Pez Tortilla in advance!', map: 'https://maps.app.goo.gl/retiro', cost: '€80', img: 'https://images.unsplash.com/photo-1549144411-97cbb1926f7d?auto=format&fit=crop&w=1200&q=80' },
            
            // PORTUGAL
            { phase: 'phase2', date: '05/06', title: 'Porto: Ribeira Day', city: 'Porto', log: 'Metro L-E from Airport.', journey: '11:00 São Bento Station (Azulejos). 14:00 Ribeira Walk. 19:00 Sunset Jardim do Morro.', tip: 'Cross the bridge on the upper level for the view.', map: 'https://maps.app.goo.gl/porto', cost: '€45', img: 'https://images.unsplash.com/photo-1555881400-74d7acaacd8b?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase2', date: '06/06', title: 'Lisboa: Pink Street', city: 'Lisboa', log: 'Alfa Pendular High Speed Train.', journey: '12:00 Check-in Alfama. 15:00 Castelo S. Jorge. 22:00 Pink Street & Bairro Alto.', tip: 'Watch out for pickpockets on Tram 28.', map: 'https://maps.app.goo.gl/lisbon', cost: '€60', img: 'https://images.unsplash.com/photo-1562184552-997c461abbe6?auto=format&fit=crop&w=1200&q=80' },
            
            // THE HITO
            { phase: 'phase3', date: '14/06', title: 'MAIN EVENT: BAD BUNNY', city: 'Madrid', log: 'Metro L7 to Metropolitano Stadium.', journey: '15:00 Pre-party outside. 19:00 Entry. 21:00 CONCIERTO.', tip: 'Charge Powerbank 100%. Wear your best sneakers.', map: 'https://maps.app.goo.gl/stadium', cost: '€120', img: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=1200&q=80' },
            
            // PARIS & BERLIN
            { phase: 'phase4', date: '16/06', title: 'Paris: Montmartre', city: 'París', log: 'Metro 12 to Abbesses.', journey: '10:00 Sacré-Cœur. 13:00 Place du Tertre (Painters). 20:00 Seine River Cruise.', tip: 'Walk down the stairs of Montmartre for hidden cafes.', map: 'https://maps.app.goo.gl/montmartre', cost: '€100', img: 'https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase4', date: '22/06', title: 'Berlin: The Wall', city: 'Berlín', log: 'S-Bahn to Warschauer Str.', journey: '11:00 East Side Gallery. 15:00 Checkpoint Charlie. 21:00 Kebab at Mustafa\'s.', tip: 'Validate your train ticket in the yellow boxes!', map: 'https://maps.app.goo.gl/eastside', cost: '€55', img: 'https://images.unsplash.com/photo-1528728329032-2972f65dfb3f?auto=format&fit=crop&w=1200&q=80' }
        ];

        const checklist = {
            "Combat Essentials": ["Passport (+ Cloud Copy)", "AirTags (inside bags)", "eSim App (Airalo)", "Universal Adapter", "Powerbank 20k mAh"],
            "Higiene & Health": ["Ibuprofen/Meds", "Solid Soap/Shampoo", "Microfiber Toall", "Sunscreen 50+", "Earplugs (for planes)"],
            "Tech Command": ["Cables (USB-C/Light)", "Noise Cancel Phones", "Offline Maps DL", "Ziploc bags (Liquids)"],
            "Survival": ["Comfy Walking Shoes", "Refillable Bottle", "Printed Emergency Contacts", "Small Rain Poncho"]
        };

        function openTab(evt, phaseId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(phaseId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function toggleDay(date) {
            const current = localStorage.getItem('trip-' + date) === 'done' ? 'pending' : 'done';
            localStorage.setItem('trip-' + date, current);
            render();
        }

        function render() {
            const phases = ['phase1', 'phase2', 'phase3', 'phase4', 'phase5'];
            phases.forEach(p => document.getElementById(p).innerHTML = '');

            let doneCount = 0;
            tripData.forEach(day => {
                const isDone = localStorage.getItem('trip-' + day.date) === 'done';
                if(isDone) doneCount++;
                const container = document.getElementById(day.phase);
                if(!container) return;

                container.innerHTML += `
                    <div class="glass p-6 md:p-8 rounded-[2.5rem] day-card ${isDone ? 'status-done' : 'status-pending'} cursor-pointer" onclick="toggleDay('${day.date}')">
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                            <div class="md:col-span-4">
                                <div class="img-container">
                                    <img src="${day.img}" alt="${day.city}">
                                    <div class="absolute top-4 left-4 glass px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">${day.date}</div>
                                </div>
                            </div>
                            <div class="md:col-span-8 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 class="text-3xl font-extrabold tracking-tighter">${day.title}</h3>
                                            <p class="text-blue-400 font-bold text-xs uppercase tracking-[0.2em] mt-1">${day.city}</p>
                                        </div>
                                        <span class="price-badge px-4 py-1.5 rounded-full text-xs font-bold">${day.cost}</span>
                                    </div>
                                    <p class="text-slate-300 text-sm font-medium leading-relaxed mb-6">${day.journey}</p>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                            <p class="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-2">Transporte</p>
                                            <p class="text-[11px] font-medium text-slate-200">${day.log}</p>
                                        </div>
                                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                            <p class="text-[8px] font-black text-amber-500 uppercase tracking-widest mb-2">Tip de Local</p>
                                            <p class="text-[11px] font-medium text-slate-200 italic">"${day.tip}"</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-6 flex items-center justify-between">
                                    <a href="${day.map}" target="_blank" onclick="event.stopPropagation()" class="inline-flex items-center gap-2 text-[10px] font-black uppercase text-blue-400 hover:text-white transition">
                                        <i class="fa-solid fa-map-location-dot"></i> Open in Maps
                                    </a>
                                    <div class="text-[9px] font-black uppercase ${isDone ? 'text-emerald-400' : 'text-slate-500'}">
                                        ${isDone ? '<i class="fa-solid fa-circle-check"></i> MISSION DONE' : '<i class="fa-solid fa-circle-notch fa-spin"></i> PENDING'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('main-progress').innerText = Math.round((doneCount / tripData.length) * 100) + '%';
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-render');
            for(const [cat, items] of Object.entries(checklist)) {
                let html = `<div class="space-y-6">
                    <h4 class="text-xs font-black text-blue-500 uppercase tracking-[0.3em] border-b border-white/10 pb-4">${cat}</h4>
                    <div class="space-y-4">`;
                items.forEach(item => {
                    html += `
                        <div class="flex items-center gap-4 group cursor-pointer">
                            <input type="checkbox" class="w-5 h-5 rounded-lg border-white/20 bg-slate-900 text-blue-500 focus:ring-0">
                            <label class="text-sm font-bold text-slate-400 group-hover:text-white transition">${item}</label>
                        </div>
                    `;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'es', includedLanguages: 'en,es', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        window.onload = () => {
            render();
            renderChecklist();
        };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
