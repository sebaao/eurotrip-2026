<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Maestro de Viajes v12.0 - UX & Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .day-row { border-bottom: 1px solid #1e293b; transition: background 0.2s; }
        .day-row:hover { background: rgba(255,255,255,0.02); }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-logistic { background: #334155; color: #94a3b8; }
        .badge-plan { background: #1e3a8a; color: #60a5fa; }
        .badge-cost { background: #064e3b; color: #34d399; }
        .status-badge { font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; cursor: pointer; display: inline-block; }
        .status-pending { background: #475569; color: #f8fafc; }
        .status-done { background: #059669; color: #f8fafc; }
        .img-preview { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 8px; opacity: 0.8; transition: opacity 0.3s; background: #1e293b; }
        .img-preview:hover { opacity: 1; }
        .map-link { color: #60a5fa; text-decoration: underline; font-size: 0.7rem; }
        .doc-card { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 12px; }
        .progress-bar { height: 4px; background: #334155; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.5s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-2 md:p-6" onload="initApp()">
    <div class="max-w-5xl mx-auto">
        <!-- Dashboard Superior -->
        <header class="mb-8 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                        EUROPA v12.0: COCKPIT ONLINE
                    </h1>
                    <p class="text-slate-400 text-sm">31 de Mayo — 02 de Julio | Control de Operaciones</p>
                    <div class="progress-bar"><div id="main-progress" class="progress-fill"></div></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center bg-slate-900/80 p-3 rounded-xl border border-slate-700 min-w-[120px]">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Ahorro</p>
                        <p class="text-xl font-mono text-emerald-400">€1,100</p>
                    </div>
                    <div class="text-center bg-slate-900/80 p-3 rounded-xl border border-slate-700 min-w-[120px]">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Presupuesto</p>
                        <p class="text-xl font-mono text-blue-400">€2,850</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Sección de Documentos -->
        <section class="mb-10">
            <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-folder-open text-blue-400"></i> Gestor de Documentos (Vault)
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="doc-card flex items-center gap-3 opacity-50 cursor-not-allowed">
                    <i class="fa-solid fa-plane text-emerald-400"></i>
                    <div class="text-[10px]"><strong>VUELOS</strong><br><span class="opacity-50">Sin subir</span></div>
                </div>
                <div class="doc-card flex items-center gap-3 opacity-50 cursor-not-allowed">
                    <i class="fa-solid fa-train text-blue-400"></i>
                    <div class="text-[10px]"><strong>TRENES</strong><br><span class="opacity-50">Sin subir</span></div>
                </div>
                <div class="doc-card flex items-center gap-3 opacity-50 cursor-not-allowed">
                    <i class="fa-solid fa-hotel text-purple-400"></i>
                    <div class="text-[10px]"><strong>HOTELES</strong><br><span class="opacity-50">Sin subir</span></div>
                </div>
                <div class="doc-card flex items-center gap-3 opacity-50 cursor-not-allowed">
                    <i class="fa-solid fa-shield-halved text-rose-400"></i>
                    <div class="text-[10px]"><strong>SEGURO</strong><br><span class="opacity-50">Sin subir</span></div>
                </div>
            </div>
        </section>

        <!-- Navegación por Pestañas -->
        <nav class="flex overflow-x-auto border-b border-slate-700 mb-6 no-scrollbar sticky top-0 bg-[#0f172a] z-50">
            <button onclick="openTab(event, 'espana1')" class="tab-btn active px-4 py-3 text-sm font-bold whitespace-nowrap transition-all flex-1 text-center">
                [ESPAÑA I] <span class="block text-[10px] opacity-60">31/05-04/06</span>
            </button>
            <button onclick="openTab(event, 'portugal')" class="tab-btn px-4 py-3 text-sm font-bold whitespace-nowrap transition-all flex-1 text-center">
                [PORTUGAL] <span class="block text-[10px] opacity-60">05/06-11/06</span>
            </button>
            <button onclick="openTab(event, 'hito')" class="tab-btn px-4 py-3 text-sm font-bold whitespace-nowrap transition-all flex-1 text-center">
                [EL HITO] <span class="block text-[10px] opacity-60">12/06-14/06</span>
            </button>
            <button onclick="openTab(event, 'amsterdam')" class="tab-btn px-4 py-3 text-sm font-bold whitespace-nowrap transition-all flex-1 text-center">
                [BASE ÁMSTERDAM] <span class="block text-[10px] opacity-60">15/06-23/06</span>
            </button>
            <button onclick="openTab(event, 'centroeuropa')" class="tab-btn px-4 py-3 text-sm font-bold whitespace-nowrap transition-all flex-1 text-center">
                [CENTROEUROPA] <span class="block text-[10px] opacity-60">24/06-02/07</span>
            </button>
        </nav>

        <!-- Contenidos -->
        <main>
            <div id="espana1" class="tab-content active space-y-4">
                <div id="container-espana1" class="grid gap-2"></div>
            </div>
            <div id="portugal" class="tab-content space-y-4">
                <div id="container-portugal" class="grid gap-2"></div>
            </div>
            <div id="hito" class="tab-content space-y-4">
                <div id="container-hito" class="grid gap-2"></div>
            </div>
            <div id="amsterdam" class="tab-content space-y-4">
                <div id="container-amsterdam" class="grid gap-2"></div>
            </div>
            <div id="centroeuropa" class="tab-content space-y-4">
                <div id="container-centroeuropa" class="grid gap-2"></div>
            </div>
        </main>

        <footer class="mt-12 text-center text-slate-600 text-[10px] pb-8 border-t border-slate-800 pt-4">
            PAULI TRAVEL OPS v12.0 | AGENTE AUTÓNOMO DE VIAJES
        </footer>
    </div>

    <script>
        const tripData = [
            { tab: 'espana1', date: '31/05', title: 'Operación Desembarco: Madrid', log: 'Aeropuerto (L8) -> Sol. Compra Multi (2.5€) + 10v (12.2€).', plan: 'Check-in Sol. Atardecer Templo Debod.', cost: '39.70€', map: 'https://www.google.com/maps/search/Templo+de+Debod', img: 'https://images.unsplash.com/photo-1539037116277-4db20889f2d4?auto=format&fit=crop&w=400&q=80' },
            { tab: 'espana1', date: '01/06', title: 'Eje del Arte & Churros', log: 'A pie. San Ginés -> Prado.', plan: 'Churros San Ginés. Prado (Gratis 18:00).', cost: '21€', map: 'https://www.google.com/maps/search/Chocolateria+San+Gines', img: 'https://images.unsplash.com/photo-1543783232-260bc8c4161b?auto=format&fit=crop&w=400&q=80' },
            { tab: 'portugal', date: '05/06', title: 'Madrid -> Oporto', log: 'Vuelo Ryanair. Metro L-E -> Bolhão.', plan: 'Ribeira. Atardecer Jardim do Morro.', cost: '62.50€', map: 'https://www.google.com/maps/search/Jardim+do+Morro+Porto', img: 'https://images.unsplash.com/photo-1555881400-74d7acaacd8b?auto=format&fit=crop&w=400&q=80' },
            { tab: 'hito', date: '14/06', title: 'EL CONCIERTO: BAD BUNNY', log: 'Metro al recinto. Calzado cómodo.', plan: 'Evento Principal. Disfruta Seba.', cost: '65€', map: 'https://www.google.com/maps/search/Madrid+Concert+Venue', img: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=400&q=80' },
            { tab: 'amsterdam', date: '20/06', title: 'PARÍS I: Incursión Táctica', log: 'Eurostar 07:45. Metro Navigo Easy.', plan: 'Eiffel -> Marais. Cena Falafel.', cost: '100€', map: 'https://www.google.com/maps/search/Torre+Eiffel', img: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=400&q=80' },
            { tab: 'centroeuropa', date: '28/06', title: 'Praga: El Castillo', log: 'Puente Carlos (08:00 AM).', plan: 'Castillo Praga. Callejón Oro.', cost: '21€', map: 'https://www.google.com/maps/search/Castillo+Praga', img: 'https://images.unsplash.com/photo-1541343672885-9be56236302a?auto=format&fit=crop&w=400&q=80' }
        ];

        function initApp() {
            renderTrip();
            updateProgress();
        }

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            const btns = document.getElementsByClassName("tab-btn");
            for (let b of btns) b.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function toggleStatus(date) {
            const status = localStorage.getItem('status-' + date) === 'done' ? 'pending' : 'done';
            localStorage.setItem('status-' + date, status);
            renderTrip();
            updateProgress();
        }

        function updateProgress() {
            const total = tripData.length;
            const done = tripData.filter(d => localStorage.getItem('status-' + d.date) === 'done').length;
            document.getElementById('main-progress').style.width = ((done/total)*100) + '%';
        }

        function renderTrip() {
            const groups = ['espana1', 'portugal', 'hito', 'amsterdam', 'centroeuropa'];
            groups.forEach(g => document.getElementById('container-' + g).innerHTML = '');

            tripData.forEach(day => {
                const container = document.getElementById('container-' + day.tab);
                if (container) {
                    const status = localStorage.getItem('status-' + day.date) || 'pending';
                    const sClass = status === 'done' ? 'status-done' : 'status-pending';
                    container.innerHTML += `
                        <div class="day-row bg-slate-800/20 p-4 rounded-lg grid grid-cols-1 md:grid-cols-12 gap-4">
                            <div class="md:col-span-2 text-center border-r border-slate-700 pr-4">
                                <span class="text-xs font-bold text-slate-500">${day.date}</span>
                                <div class="status-badge ${sClass} block mt-2" onclick="toggleStatus('${day.date}')">${status.toUpperCase()}</div>
                                <img src="${day.img}" class="img-preview" alt="View">
                            </div>
                            <div class="md:col-span-10">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="text-md font-bold text-blue-300">${day.title}</h4>
                                    <a href="${day.map}" target="_blank" class="map-link"><i class="fa-solid fa-location-dot"></i> GOOGLE MAPS</a>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-[11px]">
                                    <div class="bg-slate-900/40 p-2 rounded"><span class="badge badge-logistic">Logística</span><p class="mt-1">${day.log}</p></div>
                                    <div class="bg-slate-900/40 p-2 rounded"><span class="badge badge-plan">Plan</span><p class="mt-1">${day.plan}</p></div>
                                    <div class="bg-slate-900/40 p-2 rounded"><span class="badge badge-cost">Coste</span><p class="mt-1 text-emerald-400">${day.cost}</p></div>
                                </div>
                            </div>
                        </div>`;
                }
            });
        }
    </script>
</body>
</html>
