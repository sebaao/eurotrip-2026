<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUROTRIP 2026 | MISSION CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; }
        .img-card { width: 100%; height: 160px; object-fit: cover; border-radius: 1rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        body { top: 0px !important; }
        .goog-te-gadget-simple { background: rgba(30, 41, 59, 0.8) !important; border: 1px solid rgba(255,255,255,0.1) !important; padding: 8px 12px !important; border-radius: 12px !important; color: white !important; }
        .goog-te-gadget-simple span { color: white !important; font-size: 12px !important; font-weight: 600 !important; }
        #google_translate_element { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="google_translate_element"></div>

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <header class="glass p-8 rounded-[2.5rem] mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <div class="flex items-center gap-2 text-blue-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-2">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span>
                    Live Mission Control
                </div>
                <h1 class="text-5xl font-extrabold tracking-tighter">EUROTRIP <span class="text-blue-500">26</span></h1>
                <p class="text-slate-400 mt-1">Seba & Tavi • Full Operational Itinerary</p>
            </div>
            <div class="flex gap-4">
                <div class="glass px-6 py-4 rounded-2xl text-center">
                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Total Budget</p>
                    <p class="text-2xl font-bold text-emerald-400">€2,850</p>
                </div>
                <div class="glass px-6 py-4 rounded-2xl text-center">
                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Savings</p>
                    <p class="text-2xl font-bold text-blue-400">€1,100</p>
                </div>
            </div>
        </header>

        <!-- DOCS & SOS -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl flex items-center gap-4">
                <div class="h-10 w-10 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-500"><i class="fa-solid fa-phone"></i></div>
                <div><p class="text-[10px] text-slate-500 font-bold">EMERGENCY</p><p class="text-sm font-bold">112 (EU SOS)</p></div>
            </div>
            <div class="glass p-4 rounded-3xl flex items-center gap-4">
                <div class="h-10 w-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-500"><i class="fa-solid fa-file-invoice"></i></div>
                <div><p class="text-[10px] text-slate-500 font-bold">RESERVATIONS</p><p class="text-sm font-bold">Open Vault</p></div>
            </div>
            <div class="glass p-4 rounded-3xl flex items-center gap-4 col-span-1 md:col-span-2">
                <div class="h-10 w-10 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-500"><i class="fa-solid fa-passport"></i></div>
                <div><p class="text-[10px] text-slate-500 font-bold">VISA STATUS</p><p class="text-sm font-bold">Chile: 90 Days Free (EES Scan Req.)</p></div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="flex gap-2 overflow-x-auto pb-4 mb-8 no-scrollbar">
            <button onclick="openTab(event, 'phase1')" class="tab-btn active glass px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">PHASE I: MADRID</button>
            <button onclick="openTab(event, 'phase2')" class="tab-btn glass px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">PHASE II: PORTUGAL</button>
            <button onclick="openTab(event, 'phase3')" class="tab-btn glass px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">PHASE III: THE EVENT</button>
            <button onclick="openTab(event, 'phase4')" class="tab-btn glass px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">PHASE IV: AMSTERDAM</button>
            <button onclick="openTab(event, 'phase5')" class="tab-btn glass px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">PHASE V: CENTRAL EU</button>
        </nav>

        <!-- CONTENT -->
        <div id="phase1" class="tab-content active space-y-6"></div>
        <div id="phase2" class="tab-content space-y-6"></div>
        <div id="phase3" class="tab-content space-y-6"></div>
        <div id="phase4" class="tab-content space-y-6"></div>
        <div id="phase5" class="tab-content space-y-6"></div>

        <!-- CHECKLIST -->
        <section class="mt-12 glass p-8 rounded-[2.5rem]">
            <h2 class="text-2xl font-bold mb-8">Ultimate Checklist</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12" id="checklist-container"></div>
        </section>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'es', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }

        const tripData = [
            { phase: 'phase1', date: '31/05', title: 'Arrival: Madrid Barajas', log: 'Metro L8 -> Sol. Buy Multi Card (€2.50) + 10 trips (€12.20).', detail: 'Morning: Land and drop bags. Noon: Lunch at Plaza Mayor (Bocadillo calamares). Sunset: Templo de Debod.', map: 'https://maps.app.goo.gl/9Z1J3', cost: '€40', img: 'https://images.unsplash.com/photo-1539037116277-4db20889f2d4?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase1', date: '01/06', title: 'Madrid: Historic Core', log: 'Walk everywhere. Google Maps "San Gines" for breakfast.', detail: 'Churros at San Gines. Visit Palacio Real (Book 12€). Evening: Tapas in Malasaña (Pez Tortilla).', map: 'https://maps.app.goo.gl/madrid1', cost: '€30', img: 'https://images.unsplash.com/photo-1543783232-260bc8c4161b?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase2', date: '05/06', title: 'Porto: Bridge Views', log: 'Metro L-E from Airport to Bolhão.', detail: 'Walk Ribeira. Sunset at Jardim do Morro (Best views). Eat: Francesinha at Café Santiago.', map: 'https://maps.app.goo.gl/porto', cost: '€25', img: 'https://images.unsplash.com/photo-1555881400-74d7acaacd8b?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase3', date: '14/06', title: 'MAIN EVENT: MADRID', log: 'Metro L7 to Stadium. Arrive 2 hours early.', detail: 'Hydrate. Wear comfy sneakers. Merch shop inside.', map: 'https://maps.app.goo.gl/stadium', cost: '€60', img: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=1200&q=80' },
            { phase: 'phase4', date: '20/06', title: 'Paris Raid: Eiffel Day', log: 'Eurostar 07:45. Buy Navigo Easy at Gare du Nord.', detail: 'Lunch: CheZaline. Walk Trocadero -> Eiffel. Dinner: Marais (Falafel).', map: 'https://maps.app.goo.gl/paris', cost: '€110', img: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=1200&q=80' }
        ];

        const checklistData = {
            "Essentials": ["Passport (>6m)", "EES Pre-scan", "Universal Adapter", "AirTags for bags"],
            "Tech": ["Powerbank 20k", "eSim (Airalo)", "Offline Maps", "Noise Cancel Headphones"],
            "Survival": ["Comfy Shoes", "Ziploc Bags", "Emergency Cash (50€)", "Refillable Bottle"]
        };

        function init() {
            renderItinerary();
            renderChecklist();
        }

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            const btns = document.getElementsByClassName("tab-btn");
            for (let b of btns) b.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function renderItinerary() {
            tripData.forEach(day => {
                const container = document.getElementById(day.phase);
                if (container) {
                    container.innerHTML += `
                        <div class="glass p-6 rounded-[2rem] grid grid-cols-1 md:grid-cols-3 gap-6">
                            <img src="${day.img}" class="img-card shadow-2xl" onerror="this.src='https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=1200&q=80'">
                            <div class="md:col-span-2 space-y-4">
                                <div class="flex justify-between items-start">
                                    <div><span class="text-blue-400 font-bold text-xs uppercase">${day.date}</span><h3 class="text-2xl font-extrabold mt-1">${day.title}</h3></div>
                                    <span class="glass px-3 py-1 rounded-full text-emerald-400 font-mono text-sm">${day.cost}</span>
                                </div>
                                <p class="text-slate-300 text-sm leading-relaxed">${day.detail}</p>
                                <div class="flex flex-wrap gap-4 pt-2">
                                    <div class="flex items-center gap-2 text-[10px] text-slate-500 font-bold"><i class="fa-solid fa-train-subway text-blue-500"></i> ${day.log}</div>
                                    <a href="${day.map}" target="_blank" class="text-[10px] text-blue-400 font-bold hover:underline"><i class="fa-solid fa-location-arrow"></i> OPEN IN MAPS</a>
                                </div>
                            </div>
                        </div>`;
                }
            });
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            for (const [cat, items] of Object.entries(checklistData)) {
                let html = `<div><h4 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">${cat}</h4><div class="space-y-3">`;
                items.forEach(item => {
                    html += `<div class="flex items-center gap-3"><input type="checkbox" class="w-4 h-4 rounded border-slate-700 bg-slate-900 text-blue-500"><label class="text-sm text-slate-300">${item}</label></div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        window.onload = init;
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
